<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whack-a-Mole</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #2d5a1b;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      user-select: none;
    }

    h1 {
      color: #fff;
      font-size: 2.8rem;
      text-shadow: 3px 3px 0 #1a3a0f;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .hud {
      display: flex;
      gap: 30px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .hud-box {
      background: #1a3a0f;
      border: 3px solid #5a9e32;
      border-radius: 12px;
      padding: 10px 24px;
      text-align: center;
      min-width: 110px;
    }

    .hud-box .label {
      color: #8fcc52;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hud-box .value {
      color: #fff;
      font-size: 2rem;
      font-weight: bold;
    }

    #timer.low { color: #ff5555; animation: pulse 0.5s infinite; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 10px 28px;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
    }

    button:active { transform: scale(0.95); }

    #startBtn {
      background: #5cb85c;
      color: #fff;
      box-shadow: 0 4px 0 #3a7a3a;
    }

    #startBtn:hover { background: #4caa4c; }

    #startBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    #resetBtn {
      background: #e8a020;
      color: #fff;
      box-shadow: 0 4px 0 #a06010;
    }

    #resetBtn:hover { background: #d49010; }

    .difficulty {
      display: flex;
      gap: 8px;
      align-items: center;
      color: #8fcc52;
      font-size: 0.9rem;
    }

    .difficulty select {
      padding: 6px 12px;
      border-radius: 6px;
      border: 2px solid #5a9e32;
      background: #1a3a0f;
      color: #fff;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      max-width: 480px;
      width: 100%;
    }

    .hole {
      position: relative;
      padding-bottom: 100%;
      background: #1a3a0f;
      border-radius: 50%;
      border: 4px solid #0e2208;
      box-shadow: inset 0 8px 20px rgba(0,0,0,0.6);
      overflow: hidden;
      cursor: pointer;
    }

    .mole {
      position: absolute;
      bottom: -100%;
      left: 50%;
      transform: translateX(-50%);
      width: 75%;
      font-size: 3.5rem;
      text-align: center;
      line-height: 1;
      transition: bottom 0.15s ease-out;
      cursor: pointer;
      pointer-events: none;
    }

    .hole.up .mole {
      bottom: 5%;
      pointer-events: all;
    }

    .hole.whacked .mole {
      bottom: -100%;
      pointer-events: none;
    }

    /* Hit splash */
    .splash {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 2rem;
      animation: splash 0.5s ease-out forwards;
      pointer-events: none;
      z-index: 10;
    }

    @keyframes splash {
      0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
      60%  { transform: translate(-50%, -80%) scale(1.4); opacity: 1; }
      100% { transform: translate(-50%, -120%) scale(1); opacity: 0; }
    }

    .score-pop {
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      color: #ffe200;
      font-size: 1.4rem;
      font-weight: bold;
      text-shadow: 1px 1px 0 #000;
      animation: scorePop 0.7s ease-out forwards;
      pointer-events: none;
      z-index: 11;
    }

    @keyframes scorePop {
      0%   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-40px) scale(1.3); }
    }

    .high-scores {
      margin-top: 28px;
      background: #1a3a0f;
      border: 3px solid #5a9e32;
      border-radius: 14px;
      padding: 16px 28px;
      min-width: 220px;
      text-align: center;
    }

    .high-scores h2 {
      color: #8fcc52;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .high-scores ol {
      list-style: none;
      padding: 0;
    }

    .high-scores li {
      color: #fff;
      font-size: 1.1rem;
      padding: 3px 0;
      border-bottom: 1px solid #2d5a1b;
    }

    .high-scores li:first-child { color: #ffd700; font-weight: bold; }
    .high-scores li:nth-child(2) { color: #c0c0c0; }
    .high-scores li:nth-child(3) { color: #cd7f32; }

    .message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: #1a3a0f;
      border: 4px solid #5a9e32;
      border-radius: 20px;
      padding: 30px 50px;
      text-align: center;
      z-index: 100;
      animation: popIn 0.4s ease-out forwards;
    }

    @keyframes popIn {
      0%   { transform: translate(-50%, -50%) scale(0); }
      70%  { transform: translate(-50%, -50%) scale(1.1); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    .message h2 { color: #8fcc52; font-size: 1.8rem; margin-bottom: 10px; }
    .message p  { color: #fff; font-size: 1.2rem; }
    .message .new-best { color: #ffd700; font-size: 1rem; margin-top: 6px; }
  </style>
</head>
<body>

  <h1>Whack-a-Mole!</h1>

  <div class="hud">
    <div class="hud-box">
      <div class="label">Score</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="hud-box">
      <div class="label">Time</div>
      <div class="value" id="timer">30</div>
    </div>
    <div class="hud-box">
      <div class="label">Best</div>
      <div class="value" id="best">0</div>
    </div>
  </div>

  <div class="controls">
    <button id="startBtn">Start Game</button>
    <button id="resetBtn">Reset</button>
    <div class="difficulty">
      <label for="diff">Difficulty:</label>
      <select id="diff">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="high-scores">
    <h2>High Scores</h2>
    <ol id="highScoreList"></ol>
  </div>

  <script>
    const HOLES = 9;
    const DIFFICULTY = {
      easy:   { minUp: 900,  maxUp: 1800, interval: 1400 },
      medium: { minUp: 600,  maxUp: 1200, interval: 900  },
      hard:   { minUp: 350,  maxUp: 750,  interval: 600  },
    };
    const GAME_TIME = 30;
    const SPLASHES = ['💥','✨','⭐','💫','🌟'];

    let score = 0;
    let timeLeft = GAME_TIME;
    let running = false;
    let timerInterval = null;
    let moleTimeout = null;
    let activeHole = null;
    let moleUpTimeout = null;

    const scoreEl   = document.getElementById('score');
    const timerEl   = document.getElementById('timer');
    const bestEl    = document.getElementById('best');
    const startBtn  = document.getElementById('startBtn');
    const resetBtn  = document.getElementById('resetBtn');
    const diffSel   = document.getElementById('diff');
    const grid      = document.getElementById('grid');
    const hsList    = document.getElementById('highScoreList');

    // Build grid
    for (let i = 0; i < HOLES; i++) {
      const hole = document.createElement('div');
      hole.className = 'hole';
      const mole = document.createElement('div');
      mole.className = 'mole';
      mole.textContent = '🐭';
      hole.appendChild(mole);
      hole.addEventListener('click', onWhack);
      grid.appendChild(hole);
    }

    const holes = Array.from(document.querySelectorAll('.hole'));

    // High scores from localStorage
    function getHighScores() {
      try { return JSON.parse(localStorage.getItem('wamScores') || '[]'); }
      catch { return []; }
    }

    function saveHighScore(s) {
      let scores = getHighScores();
      scores.push(s);
      scores.sort((a, b) => b - a);
      scores = scores.slice(0, 5);
      localStorage.setItem('wamScores', JSON.stringify(scores));
      return scores;
    }

    function renderHighScores() {
      const scores = getHighScores();
      const best = scores[0] || 0;
      bestEl.textContent = best;
      hsList.innerHTML = scores.length
        ? scores.map((s, i) => `<li>${i + 1}. ${s} pts</li>`).join('')
        : '<li style="color:#8fcc52">No scores yet!</li>';
    }

    renderHighScores();

    function randBetween(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function randomHole() {
      const available = holes.filter(h => !h.classList.contains('up') && !h.classList.contains('whacked'));
      if (!available.length) return null;
      return available[Math.floor(Math.random() * available.length)];
    }

    function showMole() {
      if (!running) return;
      const diff = DIFFICULTY[diffSel.value];
      const hole = randomHole();
      if (!hole) { scheduleMole(); return; }

      hole.classList.add('up');
      activeHole = hole;

      const upTime = randBetween(diff.minUp, diff.maxUp);
      moleUpTimeout = setTimeout(() => {
        if (hole.classList.contains('up')) {
          hole.classList.remove('up');
        }
        scheduleMole();
      }, upTime);
    }

    function scheduleMole() {
      if (!running) return;
      const diff = DIFFICULTY[diffSel.value];
      const delay = randBetween(diff.interval * 0.3, diff.interval);
      moleTimeout = setTimeout(showMole, delay);
    }

    function onWhack(e) {
      if (!running) return;
      const hole = e.currentTarget;
      if (!hole.classList.contains('up') || hole.classList.contains('whacked')) return;

      hole.classList.remove('up');
      hole.classList.add('whacked');
      score++;
      scoreEl.textContent = score;

      // Splash animation
      const splash = document.createElement('div');
      splash.className = 'splash';
      splash.textContent = SPLASHES[Math.floor(Math.random() * SPLASHES.length)];
      hole.appendChild(splash);
      splash.addEventListener('animationend', () => splash.remove());

      // Score pop
      const pop = document.createElement('div');
      pop.className = 'score-pop';
      pop.textContent = '+1';
      hole.appendChild(pop);
      pop.addEventListener('animationend', () => pop.remove());

      setTimeout(() => hole.classList.remove('whacked'), 400);

      scheduleMole();
    }

    function startGame() {
      score = 0;
      timeLeft = GAME_TIME;
      scoreEl.textContent = 0;
      timerEl.textContent = timeLeft;
      timerEl.classList.remove('low');
      running = true;
      startBtn.disabled = true;
      diffSel.disabled = true;

      holes.forEach(h => {
        h.classList.remove('up', 'whacked');
      });

      timerInterval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;
        if (timeLeft <= 5) timerEl.classList.add('low');
        if (timeLeft <= 0) endGame();
      }, 1000);

      scheduleMole();
    }

    function endGame() {
      running = false;
      clearInterval(timerInterval);
      clearTimeout(moleTimeout);
      clearTimeout(moleUpTimeout);
      holes.forEach(h => h.classList.remove('up', 'whacked'));
      startBtn.disabled = false;
      diffSel.disabled = false;

      const scores = saveHighScore(score);
      renderHighScores();
      const isNewBest = scores[0] === score && scores.filter(s => s === score).length === 1;

      showMessage(score, isNewBest);
    }

    function showMessage(finalScore, isNewBest) {
      const msg = document.createElement('div');
      msg.className = 'message';
      msg.innerHTML = `
        <h2>Time's Up!</h2>
        <p>You scored <strong>${finalScore}</strong> points</p>
        ${isNewBest ? '<p class="new-best">New High Score!</p>' : ''}
      `;
      document.body.appendChild(msg);
      setTimeout(() => msg.remove(), 2500);
    }

    function resetGame() {
      running = false;
      clearInterval(timerInterval);
      clearTimeout(moleTimeout);
      clearTimeout(moleUpTimeout);
      score = 0;
      timeLeft = GAME_TIME;
      scoreEl.textContent = 0;
      timerEl.textContent = timeLeft;
      timerEl.classList.remove('low');
      holes.forEach(h => h.classList.remove('up', 'whacked'));
      startBtn.disabled = false;
      diffSel.disabled = false;
    }

    startBtn.addEventListener('click', startGame);
    resetBtn.addEventListener('click', resetGame);
  </script>
</body>
</html>
